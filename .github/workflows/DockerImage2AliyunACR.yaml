name: Sync Docker Image to Aliyun ACR

on:
  workflow_dispatch:
    inputs:
      docker_images:
        description: '请填写需要转存的源 docker 镜像名称，多个用英文逗号分开 (例如: alpine:latest,nginx:alpine)'
        required: true
        default: 'alpine:latest'
      aliyun_namespace:
        description: '您的阿里云容器镜像服务命名空间 (Namespace)'
        required: true
      aliyun_region:
        description: '您的阿里云 ACR 所在地域 (例如: cn-hangzhou, cn-beijing, cn-shanghai)'
        required: true
        default: 'cn-hangzhou'
      aliyun_username:
        description: '阿里云容器镜像服务登录用户名'
        required: true

jobs:
  sync_to_aliyun:
    runs-on: ubuntu-latest
    steps:
      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.${{ github.event.inputs.aliyun_region }}.aliyuncs.com
          username: ${{ github.event.inputs.aliyun_username }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: Pull, Tag and Push Images
        run: |
          images="${{ github.event.inputs.docker_images }}"
          namespace="${{ github.event.inputs.aliyun_namespace }}"
          region="${{ github.event.inputs.aliyun_region }}"
          registry="registry.${region}.aliyuncs.com"
          
          # 将输入的逗号分隔字符串转换为数组
          IFS=',' read -r -a image_array <<< "$images"
          
          for image in "${image_array[@]}"; do
            echo "Processing image: ${image}"
            
            # 1. 拉取原始镜像
            docker pull "${image}"
            
            # 2. 解析镜像名称和标签
            # 处理没有提供 tag 的情况，默认为 latest
            if [[ "$image" != *":"* ]]; then
              image_with_tag="${image}:latest"
            else
              image_with_tag="${image}"
            fi
            
            # 提取镜像的最后一部分作为目标仓库的镜像名 (例如将 library/alpine 变为 alpine)
            image_name=$(echo "$image_with_tag" | awk -F'/' '{print $NF}' | awk -F':' '{print $1}')
            image_tag=$(echo "$image_with_tag" | awk -F':' '{print $2}')
            
            # 构建阿里云目标镜像完整路径
            target_image="${registry}/${namespace}/${image_name}:${image_tag}"
            
            echo "Tagging ${image} as ${target_image}"
            
            # 3. 重新打标签
            docker tag "${image}" "${target_image}"
            
            # 4. 推送到阿里云
            echo "Pushing ${target_image} to Aliyun ACR..."
            docker push "${target_image}"
            
            echo "Successfully synced ${image} to ${target_image}"
          done